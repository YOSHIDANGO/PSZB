<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>DIE YET TYPE-A</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <section class="cabinet-game" aria-label="DIE YET パチスロシミュレーター">
    <img class="cabinet-img" src="assets/cabinet/cabinet-main.png" alt="DIE YET 筐体">

    <div class="cabinet-effect-layer" id="cabinetEffectLayer" aria-hidden="true">
      <div class="cabinet-flash"></div>
      <div class="cabinet-blackout"></div>
      <div class="lamp lamp-left-top"></div>
      <div class="lamp lamp-right-top"></div>
      <div class="lamp lamp-left-side"></div>
      <div class="lamp lamp-right-side"></div>
      <div class="lamp lamp-left-reel"></div>
      <div class="lamp lamp-right-reel"></div>
      <div class="lcd-frame-glow"></div>
      <div class="reel-frame-glow"></div>
      <div class="push-glow"></div>
      <div class="stop-glow stop-glow-1"></div>
      <div class="stop-glow stop-glow-2"></div>
      <div class="stop-glow stop-glow-3"></div>
      <div class="bottom-panel-glow"></div>
    </div>

    <div class="counter-live total"><b id="games">0</b></div>
    <div class="counter-live big"><b id="bigCount">0</b></div>
    <div class="counter-live reg"><b id="regCount">0</b></div>
    <div class="counter-live credit"><b id="credit">50</b></div>

    <section class="lcd-window" aria-label="液晶演出">
      <img id="stageBg" class="stage-bg" src="assets/backgrounds/corridor.png" alt="">
      <div class="stage-vignette"></div>
      <img id="hero" class="actor hero" src="" alt="">
      <img id="enemyA" class="actor enemy enemy-a" src="" alt="">
      <img id="enemyB" class="actor enemy enemy-b" src="" alt="">
      <img id="enemyC" class="actor enemy enemy-c" src="" alt="">
      <div class="boss-battle" id="bossBattle" aria-hidden="true">
        <div class="boss-sprite" id="bossSprite"></div>
        <div class="boss-rate" id="bossRate"></div>
      </div>
      <div class="prize-scene" id="prizeScene" aria-hidden="true">
        <div class="horde-silhouette" id="hordeSilhouette"></div>
        <div class="prize-box" id="prizeBox"></div>
        <div class="prize-burst" id="prizeBurst"></div>
        <img class="prize-symbol" id="prizeSymbol" src="" alt="">
      </div>
      <div class="lcd-status" id="lcdStatus">READY</div>
      <div class="screen-flash" id="screenFlash"></div>
      <div class="long-freeze" id="longFreeze" aria-hidden="true">
        <video id="longFreezeVideo" class="long-freeze-video" src="assets/lcd/long-freeze.mp4" preload="auto" muted playsinline></video>
      </div>
    </section>

    <section class="reel-window" aria-label="リール">
      <div class="payline"></div>
      <div class="reels" id="reels">
        <div class="reel" data-reel="0"></div>
        <div class="reel" data-reel="1"></div>
        <div class="reel" data-reel="2"></div>
      </div>
    </section>

    <button id="maxBetBtn" class="hit-area hit-maxbet" aria-label="MAX BET"></button>
    <button id="pushBtn" class="hit-area hit-push" aria-label="PUSH BUTTON"></button>
    <button class="hit-area stop-hit hit-stop1" data-stop="0" aria-label="STOP 1"></button>
    <button class="hit-area stop-hit hit-stop2" data-stop="1" aria-label="STOP 2"></button>
    <button class="hit-area stop-hit hit-stop3" data-stop="2" aria-label="STOP 3"></button>
    <button id="leverBtn" class="hit-area hit-lever" aria-label="LEVER ON"></button>
  </section>

  <section class="primary-controls" aria-label="補助操作">
    <button id="menuBtn" type="button" aria-haspopup="dialog" aria-controls="appMenu">MENU</button>
    <button id="soundToggle" type="button">SOUND ON</button>
    <button id="resetBtn" type="button">RESET</button>
  </section>

  <section class="mobile-control">
    <div class="meter"><span>BET</span><b id="bet">0</b></div>
    <div class="meter"><span>PAY</span><b id="pay">0</b></div>
    <div class="meter"><span>差枚</span><b id="diff">0</b></div>
    <div class="meter"><span>状態</span><b id="modeText">通常</b></div>
    <div class="meter"><span>BELL</span><b id="bellCount">0</b></div>
    <div class="meter"><span>SBB</span><b id="sbbCount">0</b></div>
    <div class="meter"><span>SURVIVE</span><b id="doorCount">-</b></div>
    <div class="meter"><span>合算</span><b id="bonusRate">-</b></div>
  </section>

  <div class="menu-overlay" id="appMenu" hidden>
    <section class="menu-sheet" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
      <header class="menu-header">
        <h2 id="menuTitle">DIE YET MENU</h2>
        <button id="menuCloseBtn" type="button" aria-label="メニューを閉じる">×</button>
      </header>
      <nav class="menu-tabs" aria-label="メニュー項目">
        <button class="active" type="button" data-menu-tab="info">基本情報</button>
        <button type="button" data-menu-tab="history">履歴</button>
        <button type="button" data-menu-tab="symbols">図柄</button>
        <button type="button" data-menu-tab="sound">サウンド</button>
        <button class="debug-only" type="button" data-menu-tab="debug">DEBUG</button>
      </nav>
      <div class="menu-body">
        <section class="menu-panel active" data-menu-panel="info">
          <div class="menu-summary">
            <div><span>状態</span><b id="menuModeText">通常</b></div>
            <div><span>ステージ</span><b id="menuStageText">廃ビル通路</b></div>
            <div><span>BB</span><b id="menuBigCount">0</b></div>
            <div><span>REG</span><b id="menuRegCount">0</b></div>
            <div><span>SBB</span><b id="menuSbbCount">0</b></div>
            <div><span>BELL確率</span><b id="bellRate">-</b></div>
          </div>
          <label class="setting-row">設定
            <select id="settingSelect">
              <option value="1">1</option><option value="2">2</option><option value="3">3</option>
              <option value="4">4</option><option value="5">5</option><option value="6">6</option>
            </select>
          </label>
          <p class="spec-note">小役重複 / SBB・BB・REG / SURVIVE ZONE</p>
          <h3>STAGE</h3>
          <div class="stage-buttons" id="stageButtons"></div>
        </section>
        <section class="menu-panel" data-menu-panel="history">
          <ol id="history" class="menu-history"></ol>
        </section>
        <section class="menu-panel" data-menu-panel="symbols">
          <div class="legend" id="symbolLegend"></div>
        </section>
        <section class="menu-panel" data-menu-panel="sound">
          <div class="menu-sound-control">
            <button id="menuSoundToggle" type="button">SOUND ON</button>
            <label>音量 <input id="soundVolume" type="range" min="0" max="100" value="70"></label>
          </div>
        </section>
        <section class="menu-panel debug-only" data-menu-panel="debug">
          <div id="debugPanelHost"></div>
        </section>
      </div>
    </section>
  </div>
</main>
<script src="game.js"></script>
</body>
</html>
